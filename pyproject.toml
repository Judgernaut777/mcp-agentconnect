# Root project file — dev tooling only. This repo is a workspace of three
# independently-installable distributions under packages/:
#   - agentconnect-core          (shared contracts)
#   - agentconnect-router        (the MCP control plane; the primary product)
#   - agentconnect-model-manager (the local inference satellite)
#
# Install for development (editable, all three):
#   pip install -e packages/agentconnect-core \
#               -e packages/agentconnect-router \
#               -e packages/agentconnect-model-manager
#
# Run the tests (no install needed — conftest.py wires sys.path):
#   pytest -q

[tool.pytest.ini_options]
testpaths = ["tests"]
