[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-runtime"
version = "0.1.0"
description = "AgentConnect worker runtime (LangGraph execution layer)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "agentconnect-core==0.2.0",
    "langgraph>=1.0",
    "tenacity>=8",
]

[project.optional-dependencies]
lang = [
    "langchain",
]
remote = [
    "fastapi>=0.110",
    "httpx>=0.27",
]
# Run a compute-contributor worker (agentconnect-worker) that pulls from a
# broker and executes on a local OpenAI-compatible model server. httpx drives
# the pull client; the model-manager supplies the OpenAI-compatible backend.
# --dry-run needs neither (built-in echo model).
worker = [
    "httpx>=0.27",
    "agentconnect-model-manager==0.2.0",
]

[project.scripts]
agentconnect-worker = "agentconnect.runtime.worker_cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.runtime*"]
namespaces = true
