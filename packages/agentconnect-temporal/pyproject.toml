[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-temporal"
version = "0.1.0"
description = "AgentConnect Temporal fork — an OPTIONAL durable-execution substrate. The zero-infra SQLite WorkQueue is the default; this backs deployments that already run a Temporal server, reusing the same privacy×tier authorization rule."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "agentconnect-core==0.2.0",
    "agentconnect-runtime==0.1.0",
    "temporalio>=1.8",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.temporal*"]
namespaces = true
