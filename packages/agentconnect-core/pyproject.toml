[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-core"
version = "0.2.0"
description = "Shared contracts and policy-agnostic core for the AgentConnect Router and Model Manager (schemas, config, state machine, shared memory, quota, privacy, secrets)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
]

# Safety engines are opt-in. The default install carries the standard-library
# `baseline` engine and nothing else: no model weights, no torch, no subprocess.
# TruffleHog and Gitleaks are external binaries, deliberately not pip dependencies —
# install them yourself and point `executable:` at them.
[project.optional-dependencies]
safety-secrets = ["detect-secrets>=1.5"]
safety-pii = ["presidio-analyzer>=2.2"]
safety-pii-gliner = ["gliner>=0.2"]
safety-injection = ["torch>=2.0", "transformers>=4.40"]
safety-all = [
    "detect-secrets>=1.5",
    "presidio-analyzer>=2.2",
    "gliner>=0.2",
    "torch>=2.0",
    "transformers>=4.40",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.common*", "agentconnect.core*", "agentconnect.safety*"]
namespaces = true
